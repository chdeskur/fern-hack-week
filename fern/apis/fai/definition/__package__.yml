docs: APIs for the FAI (Acorn) Service

imports:
  commons: ./commons.yml
  conversations: ./conversations.yml

service:
  auth: false
  base-path: /
  endpoints:
    createQuery:
      docs: Log a new query to the FAI DB
      path: /queries
      method: POST
      request:
        name: CreateQueryRequest
        body:
          properties:
            query_id: string
            conversation_id: string
            domain: string
            text: string
            role: string
            source: string
            created_at: datetime
            time_to_first_token:
              type: optional<double>
              docs: Time in seconds until first token was received. Only specified for Assistant responses.
      errors:
        - commons.BadRequestError
        - commons.InternalError

    getConversations:
      docs: Retrieve all paginated chat conversations
      path: /conversations/{domain}
      method: GET
      path-parameters:
        domain: string
      request:
        name: GetConversationsRequest
        query-parameters:
          source:
            type: optional<conversations.ConversationSource>
            docs: The type of conversation to retrieve
          page:
            type: optional<integer>
            docs: The page number to retrieve
          limit:
            type: optional<integer>
            docs: The number of conversations to retrieve per page
      response: conversations.Conversations
      errors:
        - commons.BadRequestError
        - commons.InternalError

    getConversationById:
      docs: Retrieve a complete conversation by conversation id
      path: /conversations/{conversation_id}
      method: GET
      path-parameters:
        conversation_id: string
      response: conversations.Conversation
      errors:
        - commons.BadRequestError
        - commons.InternalError
    
    getHistogramAnalytics:
      docs: Retrieve the usage histogram analytics for a given period
      path: /analytics/histogram/{domain}
      method: GET
      path-parameters:
        domain: string
      request:
        name: GetHistogramAnalyticsRequest
        query-parameters:
          start_date:
            type: string
            docs: The start date of the period to retrieve analytics for
          end_date:
            type: string
            docs: The end date of the period to retrieve analytics for
          groupBy:
            type: GroupBy
            docs: The field to group the analytics by
      response: conversations.HistogramAnalytics
      errors:
        - commons.BadRequestError
        - commons.InternalError

types:
  GroupBy:
    enum:
      - "DAY"
      - "MONTH"
