name: Deploy @fern-docs/icons-cdn

on:
  push:
    branches:
      - main

# Cancel previous workflows on previous push so we don't have deploys overwriting eachother here
concurrency:
  group: icons.ferndocs.com
  cancel-in-progress: true

jobs:
  ignore:
    runs-on: ubuntu-latest
    outputs:
      continue: ${{ steps.has-changed.outputs.RESULT == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: 🔎 Has changed
        id: has-changed
        # if there are changes, npx turbo-ignore returns a failure exit code
        # which makes steps.has-changed.outputs.RESULT = 'true'
        run: npx turbo-ignore @fern-docs/icons-cdn || echo "RESULT=true" >> $GITHUB_OUTPUT

  deploy:
    needs: ignore
    if: needs.ignore.outputs.continue == 'true'
    runs-on: ubuntu-latest
    env:
      VERCEL_PROJECT_ID: prj_MO0ayWSAeIoBYh8Cd13oigkd9knl
    steps:
      - name: Install
        uses: ./.github/actions/install
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy Project Artifacts to Vercel
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "VERCEL_DEPLOYMENT_URL=$url" >> $GITHUB_OUTPUT
      - name: Promote Deployment
        run: |
          url="${{ steps.deploy.outputs.VERCEL_DEPLOYMENT_URL }}"
          vercel promote $url --scope=buildwithfern --token=${{ secrets.VERCEL_TOKEN }}             
