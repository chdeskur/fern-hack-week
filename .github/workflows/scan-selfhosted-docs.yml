name: Run Security Scan for Self-Hosted Docs

on:
  push:
    branches:
      - app
  pull_request:

jobs:
  run-security-scan-self-hosted-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install
        uses: ./.github/actions/install

      - name: Compile
        run: pnpm compile
        
      - name: Build FDR CJS
        run: pnpm --filter @fern-platform/fdr build:tsup:cjs

      - name: Build self-hosted bundle
        run: pnpm docs:self-hosted-bundle:build

      - name: Next.js Cache Init
        uses: ./.github/actions/next-cache

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: pnpm --filter=@fern-platform/self-hosted docker:build

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
      - name: Scan Docker image for vulnerabilities
        run: |
          trivy image --format table --exit-code 1 --vuln-type os --no-progress --auto-refresh --severity HIGH,CRITICAL fern-self-hosted:latest