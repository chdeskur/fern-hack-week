name: CI

on:
  push:
    branches:
      - app
  pull_request:

jobs:
  run-self-hosted-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install
        uses: ./.github/actions/install

      - name: Run tests
        run: pnpm turbo build test:self-hosted --filter=@fern-platform/self-hosted