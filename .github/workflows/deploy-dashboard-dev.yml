name: Deploy Dashboard Dev
env:
  VERCEL_ORG_ID: team_6FKOM5nw037hv8g2mTk3gaH7
  VERCEL_PROJECT_ID: prj_ka9122njnAZrpIWEzatPYzEFL4Ni
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: "buildwithfern"  
on:
  push:
    tags:
      - "dashboard@*" 
    branches:
      - app
jobs:
  Deploy-Dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # This helps turbo resolve changes faster
      - name: Install
        uses: ./.github/actions/install
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Install Prisma CLI
        run: npm install --global prisma@latest
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Run Prisma Migrate
        run: |
          if [ -f .vercel/.env.production.local ]; then
            export $(grep -v '^#' .vercel/.env.production.local | grep -v '^$' | xargs)
            echo "Loaded environment variables for Prisma migration"
          else
            echo "Warning: No .vercel/.env.production.local file found"
          fi
          prisma migrate deploy --schema packages/fern-dashboard/server/prisma/schema.prisma
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy Project Artifacts to Vercel
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "VERCEL_DEPLOYMENT_URL=$url" >> $GITHUB_OUTPUT
