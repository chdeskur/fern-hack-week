name: Deploy Dashboard
env:
  VERCEL_ORG_ID: team_6FKOM5nw037hv8g2mTk3gaH7
  VERCEL_PROJECT_ID: prj_7PayvneDidzQ3RW6SUFMTN88chaa
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: "buildwithfern"  
on:
  push:
    tags:
      - "dashboard@*" 
jobs:
  Deploy-Production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # This helps turbo resolve changes faster
      - name: Install
        uses: ./.github/actions/install
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy Project Artifacts to Vercel
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "VERCEL_DEPLOYMENT_URL=$url" >> $GITHUB_OUTPUT
      - name: Promote Deployment
        run: |
          url="${{ steps.deploy.outputs.VERCEL_DEPLOYMENT_URL }}"
          vercel promote $url --scope=buildwithfern --token=${{ secrets.VERCEL_TOKEN }}